<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* Embedカードのデザイン設定 */
        .discord-embed {
            display: flex;
            flex-direction: column;
            background-color: #2b2d31; /* DiscordのEmbed背景色 */
            border-left: 4px solid #1e1f22; /* 左側の境界線 */
            border-radius: 4px;
            padding: 12px 16px;
            max-width: 432px;
            font-family: sans-serif;
            gap: 8px;
        }

        .embed-label {
            color: #dbdee1;
            font-size: 12px;
            font-weight: 600;
        }

        .embed-title {
            color: #00a8fc;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
        }

        .embed-title:hover {
            text-decoration: underline;
        }

        .embed-footer {
            color: #ffffff;
            font-size: 14px;
            line-height: 1.3;
        }
    </style>
</head>
<body style="background-color: #313338; padding: 50px;">

    <div class="discord-embed">
        <div class="embed-label">Discord</div>
        <a href="https://discord.gg/xzvzXsVWDe" target="_blank" class="embed-title">
            Join the md Discord Server!
        </a>
        <div class="embed-footer">
            https://discord.com/invite/xzvzXsVWDe
        </div>
    </div>

</body>
</html>
